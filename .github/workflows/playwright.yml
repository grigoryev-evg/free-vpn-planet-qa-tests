name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: smoke
        type: choice
        options:
          - all
          - smoke
          - e2e-ui
          - e2e-api

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.event.inputs.suite == 'all' || github.event.inputs.suite == 'smoke'

    outputs:
      pages_url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run smoke suite
        run: npm run test:smoke

      - name: Upload smoke HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-smoke
          path: |
            test-results/
            artifacts/
          if-no-files-found: ignore

      - name: Setup GitHub Pages
        if: always()
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy report to GitHub Pages
        id: deploy-pages
        if: always()
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Publish smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Smoke Report"
            echo
            echo "- Suite: \`smoke\`"
            echo "- HTML report artifact: \`playwright-report-smoke\`"
            echo "- Test results artifact: \`test-results-smoke\`"
            echo
            echo "Open the HTML report by downloading the \`playwright-report-smoke\` artifact and opening \`index.html\`."
            echo
            if [ -n "${{ steps.deploy-pages.outputs.page_url }}" ]; then
              echo "- GitHub Pages report: ${{ steps.deploy-pages.outputs.page_url }}"
            else
              echo "- GitHub Pages report: not available for this run"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-ui:
    runs-on: ubuntu-latest
    if: github.event.inputs.suite == 'all' || github.event.inputs.suite == 'e2e-ui'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E UI suite
        run: npm run test:e2e-ui

      - name: Upload E2E UI HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-ui
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload E2E UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-ui
          path: |
            test-results/
            artifacts/
          if-no-files-found: ignore

      - name: Publish E2E UI summary
        if: always()
        shell: bash
        run: |
          {
            echo "## E2E UI Report"
            echo
            echo "- Suite: \`e2e-ui\`"
            echo "- HTML report artifact: \`playwright-report-e2e-ui\`"
            echo "- Test results artifact: \`test-results-e2e-ui\`"
            echo
            echo "Open the HTML report by downloading the \`playwright-report-e2e-ui\` artifact and opening \`index.html\`."
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-api:
    runs-on: ubuntu-latest
    if: github.event.inputs.suite == 'all' || github.event.inputs.suite == 'e2e-api'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E API suite
        run: npm run test:e2e-api

      - name: Upload E2E API HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-api
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload E2E API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-api
          path: |
            test-results/
            artifacts/
          if-no-files-found: ignore
