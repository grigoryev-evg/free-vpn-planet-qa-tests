name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: assignment
        type: choice
        options:
          - assignment
          - all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    if: github.event.inputs.suite == 'all' || github.event.inputs.suite == 'assignment'

    outputs:
      pages_url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: github.event.inputs.suite == 'assignment'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browsers (all)
        if: github.event.inputs.suite == 'all'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run assignment suite
        if: github.event.inputs.suite == 'assignment'
        run: npm run test:assignment

      - name: Run full test suite
        if: github.event.inputs.suite == 'all'
        run: npm run test:all

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            artifacts/
          if-no-files-found: ignore

      - name: Setup GitHub Pages
        if: always()
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy report to GitHub Pages
        id: deploy-pages
        if: always()
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Playwright E2E Report"
            echo
            echo "- Suite: \`${{ github.event.inputs.suite }}\`"
            echo "- HTML report artifact: \`playwright-report\`"
            echo "- Test results artifact: \`test-results\`"
            echo
            echo "Open the HTML report by downloading the \`playwright-report\` artifact and opening \`index.html\`."
            echo
            if [ -n "${{ steps.deploy-pages.outputs.page_url }}" ]; then
              echo "- GitHub Pages report: ${{ steps.deploy-pages.outputs.page_url }}"
            else
              echo "- GitHub Pages report: not available for this run"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
