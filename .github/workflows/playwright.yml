name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: smoke
        type: choice
        options:
          - all
          - smoke
          - known-issues

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.event.inputs.suite == 'all' || github.event.inputs.suite == 'smoke'

    outputs:
      pages_url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: npm run test:smoke

      - name: Upload smoke HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-smoke
          path: |
            test-results/
            artifacts/
          if-no-files-found: ignore

      - name: Setup GitHub Pages
        if: always()
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy report to GitHub Pages
        id: deploy-pages
        if: always()
        continue-on-error: true
        uses: actions/deploy-pages@v4

  known-issues:
    runs-on: ubuntu-latest
    if: github.event.inputs.suite == 'all' || github.event.inputs.suite == 'known-issues'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run known issues suite
        run: npm run test:known-issues

      - name: Upload known issues HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-known-issues
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload known issues test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-known-issues
          path: |
            test-results/
            artifacts/
          if-no-files-found: ignore
